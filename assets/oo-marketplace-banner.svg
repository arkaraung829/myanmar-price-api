<svg width="728" height="90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="728" height="90" rx="12" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="680" cy="45" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="650" cy="70" r="40" fill="rgba(255,255,255,0.08)"/>

  <!-- Logo circle -->
  <circle cx="60" cy="45" r="30" fill="rgba(255,255,255,0.2)"/>
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">OO</text>

  <!-- Main text -->
  <text x="110" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">OO Marketplace</text>
  <text x="110" y="60" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">Shop smart, shop local in Myanmar</text>

  <!-- Download button -->
  <rect x="540" y="25" width="140" height="40" rx="20" fill="url(#buttonGradient)"/>
  <text x="610" y="51" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Download Now</text>
</svg>
